<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCG 역량 진단</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="mobile-progress-bar">
  <div class="mobile-progress-top">
    <span class="mobile-progress-title">응답 진행률</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress mobile-progress-track">
    <div class="bar" id="bar"></div>
  </div>
  <div class="mobile-progress-bottom" id="progressText">0 / 24 문항 완료</div>
</div>

<div class="page-shell">
  <div class="header">
    <span class="eyebrow">KCG SELF DIAGNOSIS</span>
    <h1>KCG 역량 진단</h1>
    <p>감정 · 선택 · 관계 역량을 진단합니다</p>
  </div>

  <div class="layout-grid">
    <main class="main-column">
      <div class="card login" id="loginCard">
        <div class="card-head">
          <div>
            <h3>기본 정보 입력</h3>
            <p class="card-copy">진단 시작 전에 기본 정보를 입력해주세요. 이메일은 결과 저장을 위해 필수입니다.</p>
          </div>
        </div>

        <div class="form-grid">
          <input id="email" type="email" placeholder="이메일 (필수)">
          <input id="name" placeholder="이름">
          <input id="company" placeholder="회사명">
          <input id="position" placeholder="직급">
          <input id="dept" placeholder="부서">
        </div>

        <button onclick="startSurvey()">진단 시작</button>
      </div>

      <div id="survey" style="display:none;"></div>
    </main>

    <aside class="side-column">
      <div class="desktop-floating-panel">
        <div class="card progress-card progress-desktop-only">
          <h3>응답 진행률</h3>
          <p class="progress-copy">
            모든 문항에 응답하면 결과 리포트가 생성됩니다.
          </p>
          <div class="progress-meta">
            <span id="progressPercentDesktop">0%</span>
            <span id="progressTextDesktop">0 / 24 문항 완료</span>
          </div>
          <div class="progress">
            <div class="bar" id="barDesktop"></div>
          </div>
        </div>

        <div class="card guide-card progress-desktop-only">
          <h3>응답 안내</h3>
          <ul>
            <li>직관적으로 느껴지는 값으로 응답해주시면 됩니다</li>
            <li>모든 문항은 1점부터 5점까지 선택할 수 있습니다</li>
            <li>모바일에서도 한 문항씩 자연스럽게 응답할 수 있도록 구성했습니다</li>
          </ul>
        </div>
      </div>
    </aside>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
